services:
  postgres:
    image: postgres:16-alpine
    container_name: vanstro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vanstro_dev}
      POSTGRES_USER: ${POSTGRES_USER:-vanstro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vanstro_dev}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - vanstro_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vanstro_postgres_data:
